services:
  db:
    image: postgis/postgis:15-3.3
    container_name: wevibe_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wevibe_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: wevibe_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
