name: WeVibe

configs:
  Debug: debug
  Release: release

options:
  bundleIdPrefix: com.wevibe
  deploymentTarget:
    iOS: "17.0"
  developmentRegion: en
  defaultConfig: Debug

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.10.0"
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.1.0"
  socket.io-client-swift:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.0"

targets:
  WeVibe:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      # Root-level files: AppConfig, DataModel, StaticConfig, Assets, PrivacyInfo
      - path: WeVibe
        excludes:
          - Preview Content/**
          - Firebase/**
          - Info.plist
          - WeVibe.entitlements
          - App/**
          - Views/**
          - Components/**
          - Services/**
      # Xcode 16 synced folders — Xcode auto-detects new files added to these folders,
      # no need to run `xcodegen generate` when adding Swift files here.
      - path: WeVibe/App
        type: syncedFolder
      - path: WeVibe/Views
        type: syncedFolder
      - path: WeVibe/Components
        type: syncedFolder
      - path: WeVibe/Services
        type: syncedFolder

    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseCrashlytics
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
      - package: socket.io-client-swift
        product: SocketIO

    # Runs after Compile Sources, before Resources — mirrors original build phase order
    postCompileScripts:
      - name: Firebase Plist Copy
        basedOnDependencyAnalysis: false
        script: |
          PLIST_FILENAME="GoogleService-Info.plist"
          FIREBASE_DIR="${SRCROOT}/WeVibe/Firebase"
          if [ "${CONFIGURATION}" == "Release" ]; then
              SOURCE_PLIST="${FIREBASE_DIR}/GoogleService-Info-Prod.plist"
              echo "Firebase: using PROD plist"
          else
              SOURCE_PLIST="${FIREBASE_DIR}/GoogleService-Info-Dev.plist"
              echo "Firebase: using DEV plist"
          fi
          if [ ! -f "${SOURCE_PLIST}" ]; then
              echo "error: ${SOURCE_PLIST} not found. Download it from Firebase console and place it in WeVibe/Firebase/."
              exit 1
          fi
          cp "${SOURCE_PLIST}" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/${PLIST_FILENAME}"

    # Runs after all build phases — Crashlytics dSYM upload
    postBuildScripts:
      - name: Crashlytics dSYM Upload
        basedOnDependencyAnalysis: false
        script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
        inputFiles:
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Resources/DWARF/$(PRODUCT_NAME)
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Resources/DWARF/$(PRODUCT_NAME).debug.dylib

    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: WeVibe/WeVibe.entitlements
        CODE_SIGN_IDENTITY: "Apple Distribution: Nadia Hosseinzadeh (49DV8UBRZK)"
        CODE_SIGN_STYLE: Manual
        CURRENT_PROJECT_VERSION: "1"
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        DEVELOPMENT_ASSET_PATHS: '"WeVibe/Preview Content"'
        DEVELOPMENT_TEAM: 49DV8UBRZK
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: WeVibe/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: WeVibe
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "WeVibe uses your location to show you matches nearby."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        MARKETING_VERSION: "1.0"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-ObjC"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.wevibe1.appdev
          CODE_SIGN_IDENTITY: "Apple Development: Created via API (S2MGTS829R)"
          INFOPLIST_KEY_CFBundleDisplayName: "WeVibe Dev"
          PROVISIONING_PROFILE_SPECIFIER: "match Development com.wevibe1.appdev"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.wevibe1.app
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.wevibe1.app"
